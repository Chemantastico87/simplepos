<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplePos - Kiosk</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Kiosk specific overrides */
        .sidebar { display: none; }
        .top-header { justify-content: center; margin-bottom: 20px; }
        .search-bar { width: 600px; height: 60px; font-size: 20px; border-radius: 30px; }
        .search-bar input { font-size: 20px; }
        .user-profile { display: none; }
        .cart-panel { width: 450px; }
        
        /* Welcome Screen overlay */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            background-image: url('../assets/bg.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        
        #welcome-screen .glass-card {
            background: rgba(15, 17, 26, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid var(--accent-primary);
            padding: 80px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 0 50px var(--accent-glow);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        #welcome-screen .glass-card:hover {
            transform: scale(1.05);
        }
        
        #welcome-screen h1 { font-size: 64px; font-weight: 800; margin-bottom: 20px; }
        #welcome-screen p { font-size: 24px; color: var(--text-muted); }
        
        /* Thank you screen */
        #thanks-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 17, 26, 0.95);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #thanks-screen h1 { font-size: 50px; color: var(--text-main); margin-bottom: 20px; }
        #thanks-screen p { font-size: 24px; color: var(--accent-secondary); }
    </style>
</head>
<body>
    <!-- Kiosk Welcome Screen -->
    <div id="welcome-screen" onclick="startOrder()">
        <div class="glass-card">
            <h1>Bienvenido</h1>
            <p>Toca la pantalla para hacer tu pedido</p>
        </div>
    </div>
    
    <!-- Kiosk Thank you screen -->
    <div id="thanks-screen">
        <h1>¡Gracias por tu pedido!</h1>
        <p>Por favor, retira tu ticket y procede a recoger tu pedido.</p>
    </div>

    <div class="app-container">
        <!-- Main Content Area -->
        <main class="main-content" style="padding: 40px 60px;">
            <header class="top-header">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="global-search" placeholder="¿Qué te apetece hoy?">
                </div>
            </header>

            <div class="categories" id="categories-container" style="justify-content: center; gap: 20px;">
                <!-- JS Injected Categories -->
            </div>

            <!-- Products Grid -->
            <div class="products-grid" id="products-container" style="grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));">
                <!-- JS Injected Products -->
            </div>
        </main>

        <!-- Right Sidebar (Cart) -->
        <aside class="cart-panel">
            <div class="cart-header">
                <h2>Tu Pedido</h2>
                <span class="order-id" id="cart-order-id">Mesa/Pedido Nuevo</span>
            </div>

            <div class="cart-items" id="cart-container">
                <!-- Cart items will be injected via JS -->
            </div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">€0.00</span>
                </div>
                <div class="summary-row">
                    <span>Impuestos (10%)</span>
                    <span id="tax">€0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total a Pagar</span>
                    <span id="total">€0.00</span>
                </div>
            </div>

            <button class="checkout-btn" onclick="processKioskCheckout()">
                <span>Pagar Pedido</span>
                <i class="fa-solid fa-credit-card"></i>
            </button>
            <button class="btn-secondary" style="margin-top: 15px; width: 100%; border: none;" onclick="cancelOrder()">Cancelar Pedido</button>
        </aside>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
